# IMPORTANT: This file is a TEMPLATE checked into git with placeholder values only.
# Real credentials must never be committed. In this project, real values are
# injected at apply-time, e.g.:
#
#   kubectl create secret generic orderpulse-db-secret \
#     --namespace orderpulse \
#     --from-literal=POSTGRES_USER=orderpulse_user \
#     --from-literal=POSTGRES_PASSWORD='<strong-password-here>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# which is exactly what scripts/create-secrets.sh in this repo does, so the
# password is never visible in plain text inside any tracked YAML file.

apiVersion: v1
kind: Secret
metadata:
  name: orderpulse-db-secret
  namespace: orderpulse
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: orderpulse-api-secret
  namespace: orderpulse
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
